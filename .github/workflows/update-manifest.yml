name: Publish Update Manifest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.3.1)'
        required: true

jobs:
  publish-update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: List release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view ${{ github.event.inputs.tag }} --repo ${{ github.repository }} --json assets --jq '.assets[].name'

      - name: Download latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ github.event.inputs.tag }} --pattern "latest.json" --repo ${{ github.repository }}

      - name: Push to public updates repo
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.UPDATES_REPO_TOKEN }}
        with:
          source_file: latest.json
          destination_repo: pdevera15/moss-updates
          destination_branch: main
          user_email: ${{ github.actor }}@users.noreply.github.com
          user_name: ${{ github.actor }}
          commit_message: "chore: update manifest for ${{ github.event.inputs.tag }}"
