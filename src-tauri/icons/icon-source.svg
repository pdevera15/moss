<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5E8857"/>
      <stop offset="100%" stop-color="#2D4B2B"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="280" y1="198" x2="744" y2="755" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EAF3E8"/>
    </linearGradient>
    <filter id="leafDrop" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#1A3018" flood-opacity="0.28"/>
    </filter>
    <!-- Subtle inner glow at top of background -->
    <radialGradient id="topGlow" cx="50%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background: rounded square, deep moss green gradient -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>

  <!-- Subtle top highlight -->
  <rect width="1024" height="1024" rx="224" fill="url(#topGlow)"/>

  <!-- Leaf silhouette with drop shadow -->
  <g filter="url(#leafDrop)">
    <path
      d="M512,755
         C446,728 265,602 278,472
         C291,342 400,215 512,198
         C624,215 733,342 746,472
         C759,602 578,728 512,755Z"
      fill="url(#leafGrad)"
    />
  </g>

  <!-- Center midrib (subtle dark green line on leaf) -->
  <line x1="512" y1="207" x2="512" y2="748"
        stroke="#3A5C38" stroke-width="8" stroke-linecap="round" opacity="0.38"/>

  <!-- Side veins -->
  <g stroke="#3A5C38" stroke-width="5" stroke-linecap="round" opacity="0.22" fill="none">
    <line x1="512" y1="348" x2="410" y2="382"/>
    <line x1="512" y1="400" x2="375" y2="448"/>
    <line x1="512" y1="452" x2="358" y2="508"/>
    <line x1="512" y1="504" x2="367" y2="562"/>
    <line x1="512" y1="556" x2="395" y2="608"/>
    <line x1="512" y1="348" x2="614" y2="382"/>
    <line x1="512" y1="400" x2="649" y2="448"/>
    <line x1="512" y1="452" x2="666" y2="508"/>
    <line x1="512" y1="504" x2="657" y2="562"/>
    <line x1="512" y1="556" x2="629" y2="608"/>
  </g>

  <!-- Stem (slight curve, white) -->
  <path d="M512,752 Q504,800 500,838"
        stroke="white" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.90"/>
</svg>
