name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.tauri-release.outputs.id }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(gh release list --exclude-drafts --limit 20 --json tagName \
            --jq '[.[].tagName | select(. != "${{ github.ref_name }}")] | first' \
            2>/dev/null || true)
          # Fall back to previous tag if no prior release exists yet
          [ -z "$PREV" ] && PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n1)
          RANGE="${PREV:+$PREV..}HEAD"
          FEATURES=$(git log --pretty=format:"%s" $RANGE | grep "^feat" | sed 's/^feat[^:]*: /- /' || true)
          FIXES=$(git log --pretty=format:"%s" $RANGE | grep "^fix" | sed 's/^fix[^:]*: /- /' || true)
          OTHERS=$(git log --pretty=format:"%s" $RANGE | grep -v "^feat\|^fix\|^build\|^chore\|^Merge" | sed 's/^[a-z]*[^:]*: /- /' || true)
          {
            echo 'body<<EOF'
            [ -n "$FEATURES" ] && printf "### New\n%s\n" "$FEATURES"
            [ -n "$FEATURES" ] && [ -n "$FIXES" ] && echo ""
            [ -n "$FIXES" ]    && printf "### Fixed\n%s\n" "$FIXES"
            [ -n "$OTHERS" ]   && [ -n "$FEATURES$FIXES" ] && echo ""
            [ -n "$OTHERS" ]   && printf "### Changes\n%s\n" "$OTHERS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: tauri-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.cl.outputs.body }}
          draft: true

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ''
            args: ''
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.platform }}
          cache-on-failure: true

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}


  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            })

  publish-update-manifest:
    needs: [create-release, build, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --dir ./artifacts
          ls ./artifacts/

      - name: Upload binaries to public updates repo
        env:
          GH_TOKEN: ${{ secrets.UPDATES_REPO_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          VERSION="${TAG#v}"
          # Create release on moss-updates if it doesn't exist yet
          gh release create "$TAG" \
            --repo pdevera15/moss-updates \
            --title "$TAG" \
            --notes "" \
            2>/dev/null || true
          # Upload installers + sigs (--clobber overwrites if re-running)
          gh release upload "$TAG" \
            --repo pdevera15/moss-updates \
            --clobber \
            "artifacts/Moss_${VERSION}_x64-setup.exe" \
            "artifacts/Moss_${VERSION}_x64-setup.exe.sig" \
            "artifacts/Moss_${VERSION}_x64_en-US.msi" \
            "artifacts/Moss_${VERSION}_x64_en-US.msi.sig" \
            "artifacts/Moss_aarch64.app.tar.gz" \
            "artifacts/Moss_aarch64.app.tar.gz.sig"

      - name: Build latest.json from release signatures
        run: |
          TAG=${{ github.ref_name }}
          VERSION="${TAG#v}"
          BASE="https://github.com/pdevera15/moss-updates/releases/download/${TAG}"

          MSI_SIG=$(cat "artifacts/Moss_${VERSION}_x64_en-US.msi.sig" 2>/dev/null || echo "")
          NSIS_SIG=$(cat "artifacts/Moss_${VERSION}_x64-setup.exe.sig" 2>/dev/null || echo "")
          MAC_SIG=$(cat "artifacts/Moss_aarch64.app.tar.gz.sig" 2>/dev/null || echo "")

          node -e "
          const m = {
            version: '$VERSION',
            notes: '',
            pub_date: '$(date -u +%Y-%m-%dT%H:%M:%S.000Z)',
            platforms: {
              'darwin-aarch64':      { signature: \`$MAC_SIG\`,   url: '$BASE/Moss_aarch64.app.tar.gz' },
              'darwin-aarch64-app':  { signature: \`$MAC_SIG\`,   url: '$BASE/Moss_aarch64.app.tar.gz' },
              'windows-x86_64':      { signature: \`$NSIS_SIG\`,  url: '$BASE/Moss_${VERSION}_x64-setup.exe' },
              'windows-x86_64-msi':  { signature: \`$MSI_SIG\`,   url: '$BASE/Moss_${VERSION}_x64_en-US.msi' },
              'windows-x86_64-nsis': { signature: \`$NSIS_SIG\`,  url: '$BASE/Moss_${VERSION}_x64-setup.exe' }
            }
          };
          console.log(JSON.stringify(m, null, 2));
          " > latest.json

          echo "=== Generated latest.json ==="
          cat latest.json

      - name: Push latest.json to public updates repo
        uses: dmnemec/copy_file_to_another_repo_action@v1.1.1
        env:
          API_TOKEN_GITHUB: ${{ secrets.UPDATES_REPO_TOKEN }}
        with:
          source_file: latest.json
          destination_repo: pdevera15/moss-updates
          destination_branch: main
          user_email: ${{ github.actor }}@users.noreply.github.com
          user_name: ${{ github.actor }}
          commit_message: "chore: update manifest for ${{ github.ref_name }}"
