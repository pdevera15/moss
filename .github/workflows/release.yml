name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.tauri-release.outputs.id }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cl
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV=$(gh release list --exclude-drafts --limit 20 --json tagName \
            --jq '[.[].tagName | select(. != "${{ github.ref_name }}")] | first' \
            2>/dev/null || true)
          # Fall back to previous tag if no prior release exists yet
          [ -z "$PREV" ] && PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n1)
          RANGE="${PREV:+$PREV..}HEAD"
          FEATURES=$(git log --pretty=format:"%s" $RANGE | grep "^feat" | sed 's/^feat[^:]*: /- /' || true)
          FIXES=$(git log --pretty=format:"%s" $RANGE | grep "^fix" | sed 's/^fix[^:]*: /- /' || true)
          OTHERS=$(git log --pretty=format:"%s" $RANGE | grep -v "^feat\|^fix\|^build\|^chore\|^Merge" | sed 's/^[a-z]*[^:]*: /- /' || true)
          {
            echo 'body<<EOF'
            [ -n "$FEATURES" ] && printf "### New\n%s\n" "$FEATURES"
            [ -n "$FEATURES" ] && [ -n "$FIXES" ] && echo ""
            [ -n "$FIXES" ]    && printf "### Fixed\n%s\n" "$FIXES"
            [ -n "$OTHERS" ]   && [ -n "$FEATURES$FIXES" ] && echo ""
            [ -n "$OTHERS" ]   && printf "### Changes\n%s\n" "$OTHERS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: tauri-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.cl.outputs.body }}
          draft: true

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-targets: ''
            args: ''
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin'
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.platform }}
          cache-on-failure: true

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Upload updater zip artifacts (tauri-action skips these)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Get-ChildItem -Recurse src-tauri/target/release/bundle -Include "*.zip","*.zip.sig" | ForEach-Object {
            Write-Host "Uploading $($_.Name)"
            gh release upload ${{ github.ref_name }} $($_.FullName) --repo ${{ github.repository }} --clobber
          }

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            })

  publish-update-manifest:
    needs: [create-release, build, publish-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download latest.json and Windows zip signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} --pattern "latest.json" --repo ${{ github.repository }}
          gh release download ${{ github.ref_name }} --pattern "*.zip.sig" --repo ${{ github.repository }}

      - name: Patch latest.json with correct zip URLs and signatures
        run: |
          TAG=${{ github.ref_name }}
          REPO=${{ github.repository }}
          VERSION="${TAG#v}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"

          MSI_FILE="Moss_${VERSION}_x64_en-US.msi.zip"
          NSIS_FILE="Moss_${VERSION}_x64-setup.nsis.zip"

          MSI_SIG=$(cat "${MSI_FILE}.sig" 2>/dev/null || echo "")
          NSIS_SIG=$(cat "${NSIS_FILE}.sig" 2>/dev/null || echo "")

          MANIFEST=$(cat latest.json)

          # Patch windows-x86_64 → NSIS zip (preferred), fallback to MSI zip
          if [ -n "$NSIS_SIG" ]; then
            MANIFEST=$(echo "$MANIFEST" | jq \
              --arg url "${BASE}/${NSIS_FILE}" --arg sig "$NSIS_SIG" \
              'if .platforms["windows-x86_64"] then .platforms["windows-x86_64"].url=$url | .platforms["windows-x86_64"].signature=$sig else . end')
          elif [ -n "$MSI_SIG" ]; then
            MANIFEST=$(echo "$MANIFEST" | jq \
              --arg url "${BASE}/${MSI_FILE}" --arg sig "$MSI_SIG" \
              'if .platforms["windows-x86_64"] then .platforms["windows-x86_64"].url=$url | .platforms["windows-x86_64"].signature=$sig else . end')
          fi

          # Patch windows-x86_64-msi
          if [ -n "$MSI_SIG" ]; then
            MANIFEST=$(echo "$MANIFEST" | jq \
              --arg url "${BASE}/${MSI_FILE}" --arg sig "$MSI_SIG" \
              'if .platforms["windows-x86_64-msi"] then .platforms["windows-x86_64-msi"].url=$url | .platforms["windows-x86_64-msi"].signature=$sig else . end')
          fi

          # Patch windows-x86_64-nsis
          if [ -n "$NSIS_SIG" ]; then
            MANIFEST=$(echo "$MANIFEST" | jq \
              --arg url "${BASE}/${NSIS_FILE}" --arg sig "$NSIS_SIG" \
              'if .platforms["windows-x86_64-nsis"] then .platforms["windows-x86_64-nsis"].url=$url | .platforms["windows-x86_64-nsis"].signature=$sig else . end')
          fi

          echo "$MANIFEST" > latest.json
          echo "=== Patched latest.json ==="
          cat latest.json

      - name: Push to public updates repo
        uses: dmnemec/copy_file_to_another_repo_action@v1.1.1
        env:
          API_TOKEN_GITHUB: ${{ secrets.UPDATES_REPO_TOKEN }}
        with:
          source_file: latest.json
          destination_repo: pdevera15/moss-updates
          destination_branch: main
          user_email: ${{ github.actor }}@users.noreply.github.com
          user_name: ${{ github.actor }}
          commit_message: "chore: update manifest for ${{ github.ref_name }}"
