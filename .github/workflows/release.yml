name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.tauri-release.outputs.releaseId }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cl
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n1)
          RANGE="${PREV:+$PREV..}HEAD"
          FEATURES=$(git log --pretty=format:"%s" $RANGE | grep "^feat" | sed 's/^feat[^:]*: /- /')
          FIXES=$(git log --pretty=format:"%s" $RANGE | grep "^fix" | sed 's/^fix[^:]*: /- /')
          {
            echo 'body<<EOF'
            [ -n "$FEATURES" ] && printf "### New\n%s\n" "$FEATURES"
            [ -n "$FEATURES" ] && [ -n "$FIXES" ] && echo ""
            [ -n "$FIXES" ]    && printf "### Fixed\n%s\n" "$FIXES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: tauri-release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ steps.cl.outputs.body }}
          releaseDraft: true

  build:
    needs: create-release
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            })
